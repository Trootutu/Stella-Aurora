<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tarot of Hope — Interactive Draw (Cards Centered)</title>
  <style>
    :root {
      --card-w: 140px;
      --card-h: 220px;
      --deck-count: 15;
      --deck-overlap: 28px;
      --accent: #6b4fc6;
    }

    body {
      font-family: Georgia, serif;
      background: radial-gradient(circle at top, #0f0f1a, #000);
mcolor: #f5f5f5;
      margin: 20px;
      text-align: center;
    }
    h1 {
      color: #e6d2ff;
      text-shadow: 0 0 10px #6b4fc6;
      margin-bottom: 6px;
    }
    p.small {
      color: #cfc3ff;
      margin-top: 0;
      margin-bottom: 14px;
    }

    .controls {
      margin-bottom: 18px;
    }
    select,
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 14px;
      margin: 6px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    select {
      background: #3b2b7a;
    }

    .table {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      padding: 20px;
    }

    .deck-wrap {
      display: flex;
      justify-content: center;
      margin: 18px 0 10px;
      position: relative;
      height: calc(var(--card-h) + 8px);
      pointer-events: auto;
      transition: opacity 0.8s ease;
    }

    .deck-card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 10px;
      background: linear-gradient(145deg, #23183a, #3b2b7a);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.65),
        inset 0 0 30px rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6d2ff;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: transform 220ms ease, box-shadow 220ms ease,
        opacity 400ms ease;
    }
    .deck-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      z-index: 9999;
    }
    .deck-card.locked {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }
.deck-card.fade-out {
  opacity: 0;
  transform: translateY(-10px) scale(0.9);
  pointer-events: none;
  transition: transform 0.6s ease, opacity 0.6s ease, filter 0.6s ease;
}
    .spread-area {
      min-height: 420px;
      position: relative;
      margin-top: 18px;
    }

    .target {
      position: absolute;
      width: calc(var(--card-w) + 20px);
      height: calc(var(--card-h) + 40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .target .label {
      font-size: 13px;
      color: #d7cfff;
      min-height: 18px;
    }
.target {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

.target .moving-card {
  position: relative !important;
  left: 0 !important;
  top: 0 !important;
  margin-bottom: 10px;
}

.target .card-caption {
  display: block;
  position: relative;
  margin-top: 8px;
}

    .moving-card {
      position: fixed;
      width: var(--card-w);
      height: var(--card-h);
      transform-origin: 50% 50%;
      transition: left 900ms cubic-bezier(.2,.9,.25,1),
        top 900ms cubic-bezier(.2,.9,.25,1),
        transform 900ms cubic-bezier(.2,.9,.25,1),
        width 450ms ease,
        height 450ms ease,
        opacity 400ms ease;
      z-index: 3000;
      border-radius: 10px;
      overflow: visible;
    }

    .moving-card .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1000ms ease;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
    .moving-card.flipped .inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
    }
    .face.back {
      background: linear-gradient(145deg, #3b2b7a, #6b4fc6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6d2ff;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.18);
      font-weight: 700;
    }
    .face.front {
      transform: rotateY(180deg);
      background: #111;
    }
    .face.front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }
    .face.front img.reversed {
      transform: rotate(180deg);
    }

    .floating {
      animation: floaty 6s ease-in-out infinite;
    }
    @keyframes floaty {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-4px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    .card-caption {
      width: calc(var(--card-w) + 20px);
      color: #e6e1ff;
      margin-top: 6px;
      pointer-events: none;
    }
    .card-caption .name {
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-caption .meaning {
      color: #d6c9ff;
      font-size: 13px;
      min-height: 42px;
    }

    @media (max-width: 720px) {
      :root {
        --card-w: 110px;
        --card-h: 180px;
        --deck-overlap: 22px;
      }
      .target {
        width: calc(var(--card-w) + 8px);
        height: calc(var(--card-h) + 28px);
      }
      .card-caption {
        width: calc(var(--card-w) + 8px);
      }
    }
/* --- Ephemeral Cat Walk --- */
.cat-walker {
  position: fixed;
  bottom: 40px;
  left: -200px;
  width: 180px;
  height: 120px;
  background: url("cat-walk.png") no-repeat center / contain;
  opacity: 0.85;
  z-index: 5000;
  pointer-events: none;
  animation: catWalk 4.5s linear forwards;
}

@keyframes catWalk {
  0% {
    transform: translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateX(calc(100vw + 300px));
    opacity: 0;
  }
}

/* hide deck + spread until cat passes */
.deck-wrap,
.spread-area {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
/* --- Reset Flash Image --- */
/* --- Reset Flash Image (Enhanced) --- */
.reset-flash {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 200px;
  height: 200px;
  transform: translate(-50%, -50%) scale(0.2);
  background: url("reset-image.png") no-repeat center / cover;
  opacity: 0;
  z-index: 9000;
  pointer-events: none;
  filter: blur(0px);
  animation: resetFlashAnim 2.8s ease forwards;
}

/* expanded scale + slower fade */
@keyframes resetFlashAnim {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
    filter: blur(0px);
  }

  12% {
    opacity: 1;
  }

  65% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(8.2); /* ← expands ~25% more */
    filter: blur(0px);
  }

  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(9);
    filter: blur(0px);
  }
}
/* shimmer overlay */
.reset-flash::after {
  content: "";
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.25), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(200,160,255,0.25), transparent 45%);
  mix-blend-mode: screen;
  opacity: 0;
  animation: shimmerPulse 2.8s ease forwards;
}

@keyframes shimmerPulse {
  0% {
    opacity: 0;
    transform: scale(1);
  }
  25% {
    opacity: 0.6;
  }
  60% {
    opacity: 0.4;
    transform: scale(1.08);
  }
  100% {
    opacity: 0;
    transform: scale(1.15);
  }
}

/* background blur during reset ritual */
body.resetting {
  filter: none;
  transition: none;
}

    const spreadDefs = {
      single: {
        count: 1,
        // center vertically for single card
        positions: [{ xPct: 50, yPct: 50, rot: 0, label: "Insight" }]
      },
      three: {
        count: 3,
        positions: [
          { xPct: 25, yPct: 36, rot: 0, label: "Past" },
          { xPct: 50, yPct: 36, rot: 0, label: "Present" },
          { xPct: 75, yPct: 36, rot: 0, label: "Future" }
        ]
      },
cross: {
  count: 5,
  positions: [
    { xPct: 50, yPct: 125, rot: 0, label: "Center" },
    { xPct: 50, yPct: 20, rot: 0, label: "Above" },  // moved higher
    { xPct: 50, yPct: 225, rot: 0, label: "Below" },  // moved lower
    { xPct: 28, yPct: 125, rot: 0, label: "Left" },
    { xPct: 72, yPct: 125, rot: 0, label: "Right" }
  ]
}

    };

    const deckWrap = document.getElementById('deckWrap');
    const spreadArea = document.getElementById('spreadArea');
    const spreadSelect = document.getElementById('spread');
    const resetBtn = document.getElementById('reset');

    let deckNodes = [];
    let requiredCount = spreadDefs[spreadSelect.value].count;
    let chosenCount = 0;
    let usedCardIds = new Set();
    let activeTargets = [];

    function buildDeck(){
      deckWrap.innerHTML = '';
      deckNodes = [];
      const count = 15;
      const overlap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--deck-overlap')) || 28;
      const cardW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w')) || 140;
      const totalWidth = cardW + (count - 1) * overlap;
      deckWrap.style.width = totalWidth + 'px';
      deckWrap.style.left = '50%';
      deckWrap.style.transform = 'translateX(-50%)';

      for(let i=0;i<count;i++){
        const d = document.createElement('div');
        d.className = 'deck-card';
        const left = i * overlap;
        d.style.left = left + 'px';
        d.style.zIndex = 200 + i;
        d.innerHTML = '<div style="transform:translateY(-6px)">Tarot</div><div style="font-size:11px; margin-top:6px; opacity:0.9">of Hope</div>';
        deckWrap.appendChild(d);
        deckNodes.push(d);
      }
    }

    function setupTargets(){
      spreadArea.innerHTML = '';
      activeTargets = [];
      const def = spreadDefs[spreadSelect.value];
      requiredCount = def.count;

      def.positions.forEach((pos, idx) => {
        const t = document.createElement('div');
        t.className = 'target';
        t.dataset.index = idx;
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = pos.label;
        label.style.opacity = 0.0;
        t.appendChild(label);

        const caption = document.createElement('div');
        caption.className = 'card-caption';
        caption.innerHTML = `<div class="name"></div><div class="meaning"></div>`;
        caption.style.display = 'none';
        t.appendChild(caption);

        spreadArea.appendChild(t);
        activeTargets.push({ node: t, pos, label, caption, occupied: false });
      });

      requestAnimationFrame(() => {
        const rect = spreadArea.getBoundingClientRect();
        const cardW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w')) || 140;
        const cardH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h')) || 220;
        activeTargets.forEach(ti => {
          const left = (rect.width * (ti.pos.xPct / 100)) - (cardW / 2);
          const top  = (rect.height * (ti.pos.yPct / 100)) - (cardH / 2);
          ti.node.style.left = left + 'px';
          ti.node.style.top = top + 'px';
        });
      });
    }

    function drawRandomCard(){
      if(usedCardIds.size >= cards.length) usedCardIds.clear();
      let choice;
      do {
        choice = cards[Math.floor(Math.random() * cards.length)];
      } while (usedCardIds.has(choice.id) && usedCardIds.size < cards.length);
      usedCardIds.add(choice.id);
      return choice;
    }

    function animateDeckToTarget(deckEl, targetInfo, indexInSequence){
      // Fade and remove the used deck card
deckEl.classList.add('fade-out');
const removedLeft = parseFloat(deckEl.style.left);
deckNodes.forEach((node) => {
  const left = parseFloat(node.style.left);
  if (left > removedLeft) {
    node.style.left = (left - 28) + 'px'; // 28 = deck overlap
  }
});
// Wait a bit longer to allow fade-out to finish before removing
setTimeout(() => {
  deckEl.style.pointerEvents = 'none';
  deckEl.style.visibility = 'hidden'; // prevents layout jump
  deckEl.remove(); // clean up after animation
}, 700);

      const deckRect = deckEl.getBoundingClientRect();
      const moving = document.createElement('div');
      moving.className = 'moving-card';
      moving.style.left = deckRect.left + 'px';
      moving.style.top  = deckRect.top  + 'px';
      moving.style.width = deckRect.width + 'px';
      moving.style.height = deckRect.height + 'px';

      moving.innerHTML = `
        <div class="inner">
          <div class="face back">Tarot of Hope</div>
          <div class="face front"><img src="" alt=""></div>
        </div>
      `;
      document.body.appendChild(moving);

      const card = drawRandomCard();
      const reversed = Math.random() < 0.5;
      const imgEl = moving.querySelector('.face.front img');
      imgEl.src = card.image;
      imgEl.alt = card.name;
      if(reversed) imgEl.classList.add('reversed'); else imgEl.classList.remove('reversed');

      // absolute target rect for the flight end point (used for the glide animation)
      const targetRect = targetInfo.node.getBoundingClientRect();
      const cardW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w')) || 140;
      const cardH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h')) || 220;

      // destination in page coordinates (center the card over the target area)
      const destLeftAbs = targetRect.left + (targetRect.width - cardW)/2;
      const destTopAbs  = targetRect.top  + (targetRect.height - cardH)/2;

      const glideDelay = 60 * indexInSequence;
      setTimeout(() => {
        moving.style.left = destLeftAbs + 'px';
        moving.style.top  = destTopAbs  + 'px';
        moving.style.width = cardW + 'px';
        moving.style.height = cardH + 'px';
      }, glideDelay);

      const glideDuration = 950;
      setTimeout(() => {
        // --- key fix: when moving the animated element *into* the target node,
        // set left/top relative to the target itself (so it centers inside the target).
        // Compute left/top inside target coordinates:
        const leftInTarget = (targetRect.width - cardW) / 2;
        const topInTarget  = (targetRect.height - cardH) / 2;

        // Prepare to append into the target:
        moving.style.position = 'absolute';
        // Use the computed values *relative to the target*:
        moving.style.left = leftInTarget + 'px';
        moving.style.top  = topInTarget + 'px';

        // remove from body and append into target node
        if (moving.parentElement === document.body) {
          document.body.removeChild(moving);
        }
        targetInfo.node.appendChild(moving);

        // reveal label and flip
        targetInfo.label.style.opacity = 1;
        setTimeout(() => moving.classList.add('flipped'), 220);

        setTimeout(() => {
          const nameDiv = targetInfo.caption.querySelector('.name');
          const meaningDiv = targetInfo.caption.querySelector('.meaning');
          nameDiv.textContent = card.name + (reversed ? ' (Reversed)' : '');
          meaningDiv.textContent = reversed ? card.reversed : card.upright;
          targetInfo.caption.style.display = '';
          targetInfo.node.appendChild(targetInfo.caption);
          moving.classList.add('floating');
        }, 1250);
      }, glideDuration + glideDelay + 20);
    }

    function onDeckClick(e){
      const el = e.currentTarget;
      if(el.classList.contains('locked')) return;
      if(chosenCount >= requiredCount) return;

      const targetInfo = activeTargets.find(t => !t.occupied);
      if(!targetInfo) return;

      el.classList.add('locked');
      targetInfo.occupied = true;
      animateDeckToTarget(el, targetInfo, chosenCount);

      chosenCount++;
      if(chosenCount >= requiredCount){
        setTimeout(() => {
          deckWrap.style.opacity = 0;
          setTimeout(() => deckWrap.style.display = 'none', 800);
        }, 1200);
      }
    }

    function attachDeckHandlers(){
      deckNodes.forEach(d => {
        d.removeEventListener('click', onDeckClick);
        d.addEventListener('click', onDeckClick);
      });
    }
function playResetFlash() {
  const flash = document.createElement('div');
  flash.className = 'reset-flash';
  document.body.appendChild(flash);

  // remove after animation finishes
  setTimeout(() => {
    flash.remove();
  }, 2300);
}

function resetAll(){
  playResetFlash();

  // delay actual reset until animation is mostly done
  setTimeout(() => {
    chosenCount = 0;
    usedCardIds.clear();
    deckWrap.style.display = '';
    deckWrap.style.opacity = 1;
    buildDeck();
    setupTargets();
    attachDeckHandlers();
  }, 1200);
}


    function init(){
      buildDeck();
      setupTargets();
      attachDeckHandlers();
      spreadSelect.addEventListener('change', resetAll);
      resetBtn.addEventListener('click', resetAll);
      window.addEventListener('resize', () => setupTargets());
    }

    init();
  </script>
</body>
